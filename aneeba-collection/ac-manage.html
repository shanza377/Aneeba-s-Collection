<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aneeba's Collection — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    #lockTimer { display: none; }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-6px)}
      75%{transform:translateX(6px)}
    }
  </style>
</head>
<body class="bg-[#FFF5F8]">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
      <div class="text-center mb-6">
        <img src="/logo.png" alt="Logo" class="h-20 mx-auto mb-3 object-contain">
        <h2 class="text-2xl font-bold text-[#C2185B]">Admin Login</h2>
        <p class="text-xs text-gray-400 mt-1">Authorized personnel only</p>
      </div>

      <div id="lockTimer" class="bg-red-50 border border-red-200 rounded-xl p-3 text-center mb-4">
        <p class="text-red-600 text-sm font-semibold">🔒 Too many failed attempts</p>
        <p class="text-red-500 text-xs mt-1">Try again in <span id="lockCountdown" class="font-bold">60</span>s</p>
      </div>

      <input type="email" id="email" placeholder="Email"
        class="border w-full p-3 mb-3 rounded-lg focus:outline-none focus:border-[#C2185B]">
      <div class="relative mb-4">
        <input type="password" id="password" placeholder="Password"
          class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B] pr-10">
        <button type="button" id="togglePw"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-sm select-none">
          👁
        </button>
      </div>

      <div id="attemptsWarning" class="hidden text-amber-600 text-xs mb-3 text-center font-medium"></div>

      <button id="loginBtn"
        class="bg-[#C2185B] text-white w-full py-3 rounded-lg hover:bg-[#AD1457] font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed">
        Login
      </button>
      <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden text-center">Wrong email or password!</p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="hidden p-4 md:p-6">
    <div class="max-w-5xl mx-auto">

      <!-- Header -->
      <div class="bg-white p-5 rounded-2xl shadow mb-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <img src="/logo.png" class="h-12 object-contain">
          <div>
            <h2 class="text-xl font-bold text-[#C2185B]">Admin Dashboard</h2>
            <p id="adminEmail" class="text-xs text-gray-400"></p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-[#C2185B] hover:underline font-medium text-sm hidden md:flex items-center gap-1">
            🌐 View Website
          </a>
          <button id="logoutBtn" class="text-red-500 hover:underline font-medium text-sm">Logout</button>
        </div>
      </div>

      <!-- Add Product -->
      <div class="bg-white p-6 rounded-2xl shadow mb-6">
        <h3 class="text-lg font-bold mb-4 text-[#C2185B]">Add New Product</h3>
        <form id="productForm" class="space-y-3">
          <input name="name" placeholder="Product Name" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]" required>

          <div class="grid grid-cols-3 gap-3">
            <input name="price" type="number" placeholder="Price (Rs)" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]" required>
            <input name="discount" type="number" min="0" max="100" placeholder="Discount %" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]">
            <input name="stock" type="number" min="0" placeholder="Stock Qty" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]">
          </div>

          <textarea name="description" placeholder="Product Description (optional)" rows="3" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B] resize-none"></textarea>

          <select name="category" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]" required>
            <option value="">Select Category</option>
            <optgroup label="Dresses">
              <option value="Ready To Wear">Ready To Wear</option>
              <option value="Unstitched">Unstitched</option>
              <option value="Formal">Formal</option>
              <option value="Western Wear">Western Wear</option>
              <option value="Fancy">Fancy</option>
            </optgroup>
            <optgroup label="Accessories">
              <option value="Handbags">Handbags</option>
              <option value="Jewellery">Jewellery</option>
              <option value="Fragrance">Fragrance</option>
            </optgroup>
            <optgroup label="Cosmetics">
              <option value="Skin Care">Skin Care</option>
              <option value="Hair Care">Hair Care</option>
              <option value="Body Care">Body Care</option>
              <option value="Makeup">Makeup</option>
            </optgroup>
          </select>

          <div>
            <label class="block text-sm font-medium mb-1 text-gray-600">Product Images</label>
            <input type="file" id="productImages" name="images" multiple accept="image/*" class="border w-full p-2 rounded-lg" required>
            <div id="imagePreview" class="grid grid-cols-4 gap-2 mt-2"></div>
          </div>

          <button class="bg-[#C2185B] text-white px-6 py-3 rounded-lg w-full hover:bg-[#AD1457] font-semibold transition">Add Product</button>
        </form>
      </div>

      <!-- Hero Banners -->
      <div class="bg-white p-6 rounded-2xl shadow mb-6">
        <h3 class="text-lg font-bold mb-4 text-[#C2185B]">Manage Hero Banners</h3>
        <div class="bg-[#FFF5F8] p-4 rounded-xl mb-4 space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Select Banner Image(s)</label>
            <input type="file" id="bannerInput" accept="image/*" multiple class="w-full border p-2 rounded-lg bg-white">
          </div>
          <div id="bannerTextFields" class="space-y-3"></div>
          <button id="uploadBannerBtn" class="bg-[#C2185B] text-white px-4 py-2 rounded-lg hover:bg-[#AD1457] font-semibold transition w-full">
            Upload Banners
          </button>
        </div>
        <div id="bannerList" class="space-y-3"></div>
      </div>

      <!-- All Products -->
      <div class="bg-white p-6 rounded-2xl shadow mb-6">
        <h3 class="text-lg font-bold mb-4 text-[#C2185B]">All Products</h3>
        <div id="productList" class="space-y-3"></div>
      </div>

      <!-- Orders -->
      <div class="bg-white p-6 rounded-2xl shadow">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-[#C2185B]">📦 Orders</h3>
          <span id="newOrderBadge" class="hidden bg-red-500 text-white text-xs px-2.5 py-1 rounded-full font-bold animate-pulse"></span>
        </div>
        <div id="orderList" class="space-y-4"></div>
      </div>

    </div>
  </div>

<script type="module">
import { db, auth, storage } from "./src/firebase.js";
import {
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "firebase/auth";
import {
  collection, addDoc, getDocs, deleteDoc, updateDoc,
  doc, orderBy, query, getDoc, setDoc, serverTimestamp
} from "firebase/firestore";
import { ref, uploadBytes, getDownloadURL } from "firebase/storage";

/* ─── BRUTE-FORCE PROTECTION ─────────────────────────────── */
const LOCK_KEY    = 'ac_login_lock';
const ATTEMPT_KEY = 'ac_login_attempts';
const MAX_ATTEMPTS = 3;
const LOCK_SECONDS = 60;

function getLockState() {
  const lock = JSON.parse(localStorage.getItem(LOCK_KEY) || 'null');
  if (!lock) return null;
  const remaining = Math.ceil((lock.until - Date.now()) / 1000);
  return remaining > 0 ? remaining : null;
}

function setLock() {
  localStorage.setItem(LOCK_KEY, JSON.stringify({ until: Date.now() + LOCK_SECONDS * 1000 }));
  localStorage.setItem(ATTEMPT_KEY, '0');
}

function getAttempts() { return parseInt(localStorage.getItem(ATTEMPT_KEY) || '0', 10); }
function incAttempts() {
  const n = getAttempts() + 1;
  localStorage.setItem(ATTEMPT_KEY, String(n));
  return n;
}
function clearAttempts() {
  localStorage.removeItem(LOCK_KEY);
  localStorage.removeItem(ATTEMPT_KEY);
}

let lockInterval = null;

function startLockTimer(remaining) {
  const timerDiv     = document.getElementById('lockTimer');
  const countdown    = document.getElementById('lockCountdown');
  const loginBtn     = document.getElementById('loginBtn');
  const emailInput   = document.getElementById('email');
  const pwInput      = document.getElementById('password');
  const attWarn      = document.getElementById('attemptsWarning');

  timerDiv.style.display = 'block';
  loginBtn.disabled      = true;
  emailInput.disabled    = true;
  pwInput.disabled       = true;
  attWarn.classList.add('hidden');

  let secs = remaining;
  countdown.textContent = secs;

  if (lockInterval) clearInterval(lockInterval);
  lockInterval = setInterval(() => {
    secs--;
    countdown.textContent = secs;
    if (secs <= 0) {
      clearInterval(lockInterval);
      timerDiv.style.display = 'none';
      loginBtn.disabled    = false;
      emailInput.disabled  = false;
      pwInput.disabled     = false;
    }
  }, 1000);
}

function checkLockOnLoad() {
  const remaining = getLockState();
  if (remaining) startLockTimer(remaining);
}

checkLockOnLoad();

/* ─── TOGGLE PASSWORD VISIBILITY ─────────────────────────── */
document.getElementById('togglePw').onclick = () => {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
};

/* ─── LOGIN ──────────────────────────────────────────────── */
document.getElementById('loginBtn').onclick = async () => {
  if (getLockState()) return;

  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  const attWarn = document.getElementById('attemptsWarning');
  errEl.classList.add('hidden');

  try {
    await signInWithEmailAndPassword(auth, email, pw);
    clearAttempts();
  } catch {
    const attempts = incAttempts();
    const loginCard = document.querySelector('#loginScreen > div');
    loginCard.classList.remove('shake');
    void loginCard.offsetWidth;
    loginCard.classList.add('shake');
    errEl.classList.remove('hidden');

    const left = MAX_ATTEMPTS - attempts;
    if (left > 0) {
      attWarn.textContent = `⚠️ ${left} attempt${left > 1 ? 's' : ''} remaining before lockout`;
      attWarn.classList.remove('hidden');
    } else {
      setLock();
      startLockTimer(LOCK_SECONDS);
    }
  }
};

document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });

/* ─── AUTO-LOGOUT AFTER 30 MIN INACTIVITY ────────────────── */
const IDLE_LIMIT = 30 * 60 * 1000;
let idleTimer;

function resetIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(async () => {
    await signOut(auth);
    alert('You were logged out due to 30 minutes of inactivity.');
  }, IDLE_LIMIT);
}

['click','keydown','scroll','mousemove','touchstart'].forEach(ev =>
  document.addEventListener(ev, resetIdle, { passive: true })
);

/* ─── AUTH STATE ─────────────────────────────────────────── */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    document.getElementById('adminEmail').textContent = user.email;
    resetIdle();
    loadProducts();
    loadBanners();
    loadOrders();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
    clearTimeout(idleTimer);
    checkLockOnLoad();
  }
});

document.getElementById('logoutBtn').onclick = () => signOut(auth);

/* ─── IMAGE PREVIEW ──────────────────────────────────────── */
const imageInput   = document.querySelector('input[name="images"]');
const imagePreview = document.getElementById('imagePreview');
if (imageInput) {
  imageInput.onchange = () => {
    imagePreview.innerHTML = '';
    Array.from(imageInput.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.innerHTML += `<img src="${e.target.result}" class="w-full h-20 object-cover rounded border">`;
      };
      reader.readAsDataURL(file);
    });
  };
}

/* ─── PRODUCTS ───────────────────────────────────────────── */
async function loadProducts() {
  const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  const products = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  document.getElementById('productList').innerHTML = products.length === 0
    ? `<p class="text-gray-500">No products yet</p>`
    : products.map(p => {
        const dp = p.discount ? Math.round(p.price - (p.price * p.discount / 100)) : null;
        return `
          <div class="border rounded-xl p-3 flex justify-between items-center gap-3">
            <div class="flex gap-3 items-center">
              ${p.images?.[0] ? `<img src="${p.images[0]}" class="w-16 h-16 object-cover rounded-lg flex-shrink-0">` : ''}
              <div>
                <p class="font-semibold">${p.name}</p>
                <p class="text-xs text-gray-500">${p.category}</p>
                ${p.description ? `<p class="text-xs text-gray-400 mt-0.5 line-clamp-1">${p.description}</p>` : ''}
                <div class="flex flex-wrap gap-2 items-center mt-1">
                  ${dp
                    ? `<span class="text-[#C2185B] font-bold text-sm">Rs ${dp}</span>
                       <span class="text-gray-400 line-through text-xs">Rs ${p.price}</span>
                       <span class="bg-green-100 text-green-700 text-xs px-1.5 py-0.5 rounded">${p.discount}% OFF</span>`
                    : `<span class="text-[#C2185B] font-bold text-sm">Rs ${p.price}</span>`}
                  ${p.stock === 0
                    ? `<span class="bg-red-100 text-red-600 text-xs px-1.5 py-0.5 rounded font-semibold">Out of Stock</span>`
                    : p.stock != null
                      ? `<span class="bg-amber-100 text-amber-700 text-xs px-1.5 py-0.5 rounded">Stock: ${p.stock}</span>`
                      : ''}
                </div>
              </div>
            </div>
            <button onclick="deleteProduct('${p.id}')" class="text-red-500 text-sm hover:underline flex-shrink-0">Delete</button>
          </div>`;
      }).join('');
}

document.getElementById("productForm").onsubmit = async (e) => {
  e.preventDefault();
  const form = e.target;
  const btn  = form.querySelector('button');
  btn.disabled = true;
  btn.textContent = "Uploading...";

  try {
    const imageUrls = [];
    for (let file of form.images.files) {
      const sRef     = ref(storage, `products/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(sRef, file);
      imageUrls.push(await getDownloadURL(snapshot.ref));
    }

    await addDoc(collection(db, "products"), {
      name:        form.name.value,
      price:       Number(form.price.value),
      discount:    form.discount.value ? Number(form.discount.value) : 0,
      stock:       form.stock.value !== '' ? Number(form.stock.value) : null,
      description: form.description.value.trim(),
      category:    form.category.value,
      images:      imageUrls,
      createdAt:   serverTimestamp()
    });

    form.reset();
    imagePreview.innerHTML = '';
    loadProducts();
    alert("Product Added!");
  } catch (error) {
    alert("Error: " + error.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = "Add Product";
  }
};

window.deleteProduct = async (id) => {
  if (confirm("Delete this product?")) {
    await deleteDoc(doc(db, "products", id));
    loadProducts();
  }
};

/* ─── BANNERS ────────────────────────────────────────────── */
const bannerInput      = document.getElementById('bannerInput');
const uploadBannerBtn  = document.getElementById('uploadBannerBtn');
const bannerList       = document.getElementById('bannerList');
const bannerTextFields = document.getElementById('bannerTextFields');

bannerInput.onchange = () => {
  const files = Array.from(bannerInput.files);
  if (!files.length) { bannerTextFields.innerHTML = ''; return; }
  bannerTextFields.innerHTML = files.map((file, i) => `
    <div class="border rounded-xl p-3 bg-white space-y-2">
      <p class="text-xs font-semibold text-gray-500">Banner ${i + 1}: ${file.name}</p>
      <input type="text" id="banner-title-${i}" placeholder="Title (e.g. BIG SALE UPTO 50%)"
        class="border w-full p-2 rounded-lg text-sm focus:outline-none focus:border-[#C2185B]">
      <input type="text" id="banner-subtitle-${i}" placeholder="Subtitle"
        class="border w-full p-2 rounded-lg text-sm focus:outline-none focus:border-[#C2185B]">
      <input type="text" id="banner-btntext-${i}" placeholder='Button text (e.g. Shop Now →)'
        class="border w-full p-2 rounded-lg text-sm focus:outline-none focus:border-[#C2185B]">
    </div>`).join('');
};

async function loadBanners() {
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const banners = docSnap.exists() ? docSnap.data().list || [] : [];

  bannerList.innerHTML = banners.length === 0
    ? `<p class="text-gray-400 text-sm">No banners uploaded yet</p>`
    : banners.map(banner => `
        <div class="border rounded-xl overflow-hidden">
          <div class="relative group">
            <img src="${banner.url}" class="w-full h-36 object-cover">
            <button onclick="deleteBanner('${banner.id}')"
              class="absolute top-2 right-2 bg-red-600 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition">
              Delete
            </button>
          </div>
          <div class="p-3 bg-[#FFF5F8] space-y-1">
            <p class="font-semibold text-sm text-gray-800">${banner.title || '(No title set)'}</p>
            <p class="text-xs text-gray-500">${banner.subtitle || '(No subtitle set)'}</p>
            ${banner.btnText ? `<p class="text-xs text-[#C2185B]">Button: ${banner.btnText}</p>` : ''}
            <button onclick="editBannerText('${banner.id}')" class="text-xs text-[#C2185B] hover:underline mt-1">Edit Text</button>
          </div>
        </div>`).join("");
}

uploadBannerBtn.onclick = async () => {
  const files = bannerInput.files;
  if (!files.length) return alert("Select images first!");
  uploadBannerBtn.disabled    = true;
  uploadBannerBtn.textContent = "Uploading...";

  try {
    const docSnap  = await getDoc(doc(db, "settings", "banners"));
    const existing = docSnap.exists() ? docSnap.data().list || [] : [];

    const newBanners = await Promise.all(Array.from(files).map(async (file, i) => {
      const sRef     = ref(storage, `banners/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(sRef, file);
      return {
        id:       Date.now() + Math.random(),
        url:      await getDownloadURL(snapshot.ref),
        title:    document.getElementById(`banner-title-${i}`)?.value.trim()   || '',
        subtitle: document.getElementById(`banner-subtitle-${i}`)?.value.trim() || '',
        btnText:  document.getElementById(`banner-btntext-${i}`)?.value.trim()  || 'Shop Now →'
      };
    }));

    await setDoc(doc(db, "settings", "banners"), { list: [...existing, ...newBanners] });
    bannerInput.value         = '';
    bannerTextFields.innerHTML = '';
    loadBanners();
    alert(`${newBanners.length} banner(s) uploaded!`);
  } catch (error) {
    alert("Error: " + error.message);
  } finally {
    uploadBannerBtn.disabled    = false;
    uploadBannerBtn.textContent = "Upload Banners";
  }
};

window.editBannerText = async (id) => {
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const banners = docSnap.data().list || [];
  const banner  = banners.find(b => b.id == id);
  if (!banner) return;
  const title    = prompt("Banner Title:", banner.title || '');   if (title    === null) return;
  const subtitle = prompt("Banner Subtitle:", banner.subtitle || ''); if (subtitle === null) return;
  const btnText  = prompt("Button Text:", banner.btnText || 'Shop Now →'); if (btnText === null) return;
  const updated  = banners.map(b => b.id == id ? { ...b, title: title.trim(), subtitle: subtitle.trim(), btnText: btnText.trim() } : b);
  await setDoc(doc(db, "settings", "banners"), { list: updated });
  loadBanners();
};

window.deleteBanner = async (id) => {
  if (!confirm("Delete this banner?")) return;
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const updated = (docSnap.data().list || []).filter(b => b.id != id);
  await setDoc(doc(db, "settings", "banners"), { list: updated });
  loadBanners();
};

/* ─── ORDERS ─────────────────────────────────────────────── */
async function loadOrders() {
  const q    = query(collection(db, "orders"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  const newCount = orders.filter(o => o.status === 'pending' || o.status === 'new').length;
  const badge    = document.getElementById('newOrderBadge');
  if (newCount > 0) {
    badge.textContent = `${newCount} New`;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  const statusColors = {
    pending: 'bg-blue-100 text-blue-700', new: 'bg-blue-100 text-blue-700',
    shipped: 'bg-amber-100 text-amber-700', processing: 'bg-amber-100 text-amber-700',
    delivered: 'bg-green-100 text-green-700', cancelled: 'bg-red-100 text-red-700'
  };
  const labelMap = {
    pending: 'Pending', new: 'Pending', shipped: 'Shipped',
    processing: 'Shipped', delivered: 'Delivered', cancelled: 'Cancelled'
  };

  document.getElementById('orderList').innerHTML = orders.length === 0
    ? `<div class="text-center py-10"><p class="text-3xl mb-2">📭</p><p class="text-gray-400 text-sm">No orders yet</p></div>`
    : orders.map(o => {
        const date = o.createdAt?.toDate
          ? o.createdAt.toDate().toLocaleString('en-PK', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
          : '';
        const sc          = statusColors[o.status] || 'bg-gray-100 text-gray-700';
        const statusLabel = labelMap[o.status] || o.status.charAt(0).toUpperCase() + o.status.slice(1);
        return `
          <div class="border border-pink-100 rounded-2xl p-4 space-y-3 ${o.status === 'new' ? 'border-l-4 border-l-blue-400' : ''}">
            <div class="flex items-start justify-between gap-3">
              <div class="space-y-0.5">
                <p class="font-bold text-gray-800">${o.customerName}</p>
                <p class="text-xs text-gray-500">📱 ${o.phone}</p>
                <p class="text-xs text-gray-500">🏠 ${o.address}, ${o.city}${o.zipCode ? ' – ' + o.zipCode : ''}</p>
                <p class="text-xs text-gray-500">💳 ${o.paymentMethod}</p>
                ${date ? `<p class="text-xs text-gray-400">🕐 ${date}</p>` : ''}
              </div>
              <div class="text-right flex-shrink-0">
                <p class="text-lg font-bold text-[#C2185B]">Rs ${Number(o.total)}</p>
                <span class="text-xs ${sc} px-2.5 py-1 rounded-full font-semibold">${statusLabel}</span>
              </div>
            </div>
            <div class="flex flex-wrap gap-2">
              ${(o.items || []).map(item => `
                <div class="flex items-center gap-1.5 bg-[#FFF5F8] rounded-lg px-2 py-1.5 border border-pink-100">
                  <img src="${item.image}" class="w-7 h-7 object-cover rounded">
                  <div>
                    <p class="text-xs font-medium text-gray-700 leading-none">${item.name}</p>
                    <p class="text-xs text-[#C2185B] font-bold">Rs ${item.price}</p>
                  </div>
                </div>`).join('')}
            </div>
            <div class="flex flex-wrap gap-2 pt-1 border-t border-pink-50">
              <select onchange="updateOrderStatus('${o.id}', this.value)"
                class="text-xs border border-pink-100 rounded-lg px-2.5 py-1.5 focus:outline-none focus:border-[#C2185B] bg-white">
                <option value="pending"   ${o.status === 'pending' || o.status === 'new' ? 'selected' : ''}>🔵 Pending</option>
                <option value="shipped"   ${o.status === 'shipped' || o.status === 'processing' ? 'selected' : ''}>🟡 Shipped</option>
                <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>🟢 Delivered</option>
                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>🔴 Cancelled</option>
              </select>
              <a href="https://wa.me/${o.phone?.replace(/[^0-9]/g,'')}" target="_blank"
                class="text-xs bg-[#25D366] text-white px-3 py-1.5 rounded-lg hover:bg-[#1ebe5d] transition font-semibold flex items-center gap-1">
                💬 WhatsApp
              </a>
              <button onclick="deleteOrder('${o.id}')"
                class="text-xs text-red-400 hover:text-red-600 px-2 py-1.5 transition">
                Delete
              </button>
            </div>
          </div>`;
      }).join('');
}

window.updateOrderStatus = async (id, status) => {
  await updateDoc(doc(db, "orders", id), { status });
  loadOrders();
};

window.deleteOrder = async (id) => {
  if (!confirm('Delete this order permanently?')) return;
  await deleteDoc(doc(db, "orders", id));
  loadOrders();
};
</script>
</body>
</html>
