<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order – Aneeba's Collection</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #FFF5F8; }
    .serif { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="min-h-screen">

  <nav class="bg-white border-b border-pink-100 sticky top-0 z-30 shadow-sm">
    <div class="max-w-lg mx-auto px-4 py-3 flex items-center gap-3">
      <a href="index.html" class="text-[#C2185B] text-sm font-medium hover:underline">← Home</a>
      <div class="flex-1 text-center">
        <span class="font-bold text-gray-800 serif text-base">Track Your Order</span>
      </div>
      <a href="index.html" class="text-sm text-gray-400 hover:text-[#C2185B]">Shop</a>
    </div>
  </nav>

  <main class="max-w-lg mx-auto px-4 py-8">

    <div class="bg-white rounded-2xl shadow-sm border border-pink-100 p-6 mb-6">
      <div class="text-center mb-6">
        <div class="text-5xl mb-3">📦</div>
        <h2 class="text-xl font-bold text-gray-800 serif">Order Tracking</h2>
        <p class="text-sm text-gray-400 mt-1">Enter your phone number to track all your orders</p>
      </div>
      <div class="flex gap-2">
        <input id="phoneInput" type="tel" placeholder="e.g. 0321 1234567"
          class="flex-1 border border-pink-100 p-3 rounded-xl text-sm focus:outline-none focus:border-[#C2185B] bg-white">
        <button id="trackBtn"
          class="bg-[#C2185B] text-white px-5 py-3 rounded-xl text-sm font-semibold hover:bg-[#AD1457] transition whitespace-nowrap">
          Track
        </button>
      </div>
    </div>

    <div id="results"></div>

  </main>

<script type="module">
import { initializeApp } from "firebase/app";
import { getFirestore, collection, query, where, getDocs, orderBy } from "firebase/firestore";

const firebaseConfig = {
  apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
  authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
  projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
  storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
  messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
  appId: import.meta.env.VITE_FIREBASE_APP_ID
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const phoneInput = document.getElementById('phoneInput');
const trackBtn   = document.getElementById('trackBtn');
const results    = document.getElementById('results');

phoneInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') trackOrders(); });
trackBtn.onclick = trackOrders;

const urlPhone = new URLSearchParams(window.location.search).get('phone');
if (urlPhone) { phoneInput.value = urlPhone; trackOrders(); }

async function trackOrders() {
  const phone = phoneInput.value.trim();
  if (!phone) { phoneInput.focus(); return; }

  trackBtn.disabled = true;
  trackBtn.textContent = 'Searching...';
  results.innerHTML = `<div class="flex justify-center py-10"><div class="w-8 h-8 border-4 border-[#C2185B] border-t-transparent rounded-full animate-spin"></div></div>`;

  try {
    const q = query(collection(db, "orders"), where("phone", "==", phone), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (!orders.length) {
      results.innerHTML = `
        <div class="bg-white rounded-2xl border border-pink-100 p-10 text-center shadow-sm">
          <p class="text-4xl mb-3">🔍</p>
          <p class="font-semibold text-gray-700">No orders found</p>
          <p class="text-gray-400 text-sm mt-1">No orders placed with this phone number</p>
          <a href="index.html" class="inline-block mt-4 text-[#C2185B] text-sm font-medium hover:underline">Browse Products →</a>
        </div>`;
      return;
    }

    results.innerHTML = `
      <p class="text-xs text-gray-400 mb-3 font-medium px-1">${orders.length} order${orders.length !== 1 ? 's' : ''} found</p>
      ${orders.map(renderOrder).join('')}`;
  } catch (err) {
    results.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-600 text-sm text-center">${err.message}</div>`;
  } finally {
    trackBtn.disabled = false;
    trackBtn.textContent = 'Track';
  }
}

function renderOrder(o) {
  const date = o.createdAt?.toDate
    ? o.createdAt.toDate().toLocaleString('en-PK', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '';

  const isCancelled = o.status === 'cancelled';

  const progressMap = { pending:0, new:0, processing:0, shipped:1, delivered:2 };
  const progressIdx = progressMap[o.status] ?? 0;

  const statusColors = {
    pending:'bg-blue-100 text-blue-700', new:'bg-blue-100 text-blue-700',
    processing:'bg-amber-100 text-amber-700', shipped:'bg-amber-100 text-amber-700',
    delivered:'bg-green-100 text-green-700', cancelled:'bg-red-100 text-red-700'
  };
  const statusLabels = {
    pending:'Pending', new:'Pending', processing:'Processing',
    shipped:'Shipped', delivered:'Delivered', cancelled:'Cancelled'
  };

  const sc = statusColors[o.status] || 'bg-gray-100 text-gray-600';
  const label = statusLabels[o.status] || o.status;

  const steps = [
    { label:'Order Placed', icon:'📝' },
    { label:'Shipped',      icon:'🚚' },
    { label:'Delivered',    icon:'✅' },
  ];

  const barWidth = progressIdx === 0 ? '0%' : progressIdx === 1 ? '50%' : '100%';

  return `
    <div class="bg-white rounded-2xl shadow-sm border border-pink-100 p-5 mb-4">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="font-bold text-gray-800">${o.customerName}</p>
          ${date ? `<p class="text-xs text-gray-400 mt-0.5">🕐 ${date}</p>` : ''}
        </div>
        <div class="text-right">
          <p class="font-bold text-[#C2185B]">Rs ${o.total}</p>
          <span class="text-xs ${sc} px-2 py-0.5 rounded-full font-semibold">${label}</span>
        </div>
      </div>

      ${!isCancelled ? `
      <div class="relative flex justify-between items-start mb-5 px-3">
        <div class="absolute left-3 right-3 top-4 h-1 bg-pink-100 rounded-full"></div>
        <div class="absolute left-3 top-4 h-1 bg-[#C2185B] rounded-full transition-all duration-700" style="width:${barWidth}"></div>
        ${steps.map((s, i) => `
          <div class="relative flex flex-col items-center gap-1 z-10">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-base border-2 shadow-sm
              ${i <= progressIdx ? 'bg-[#C2185B] border-[#C2185B] text-white' : 'bg-white border-pink-200 text-gray-300'}">
              ${i <= progressIdx ? s.icon : '○'}
            </div>
            <p class="text-[10px] font-semibold ${i <= progressIdx ? 'text-[#C2185B]' : 'text-gray-300'} text-center leading-tight">${s.label}</p>
          </div>`).join('')}
      </div>` : `
      <div class="bg-red-50 border border-red-100 rounded-xl p-3 mb-4 text-center">
        <p class="text-red-500 text-sm font-semibold">❌ This order was cancelled</p>
      </div>`}

      <div class="space-y-2 mb-3">
        ${(o.items || []).map(item => `
          <div class="flex items-center gap-3 bg-[#FFF5F8] rounded-xl p-2.5 border border-pink-50">
            <img src="${item.image}" class="w-10 h-10 object-cover rounded-lg flex-shrink-0">
            <div class="flex-1 min-w-0">
              <p class="text-xs font-semibold text-gray-700 truncate">${item.name}</p>
              <p class="text-xs text-gray-400">${item.category || ''}</p>
            </div>
            <p class="text-xs font-bold text-[#C2185B] flex-shrink-0">Rs ${item.price}</p>
          </div>`).join('')}
      </div>

      <div class="bg-gray-50 rounded-xl p-3 text-xs text-gray-500 space-y-1 border border-gray-100">
        <p>🏠 ${o.address}, ${o.city}${o.zipCode ? ', ' + o.zipCode : ''}</p>
        <p>💳 ${o.paymentMethod}</p>
      </div>
    </div>`;
}
</script>
</body>
</html>
