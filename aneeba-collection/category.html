<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category - Aneeba's Collection</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif}
    h1,h2,h3{font-family:'Playfair Display',serif}
    .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  </style>
</head>
<body class="bg-[#FFF5F8]">

  <div class="bg-[#C2185B] text-white text-center py-2 text-xs sm:text-sm font-medium px-2">
    🚚 Fast Delivery | All over Pakistan | Advance Payment Available
  </div>

  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="/logo.png" alt="Logo" class="h-10 w-10 sm:h-12 sm:w-12 object-contain">
        <span class="text-lg sm:text-2xl font-bold text-[#C2185B]" style="font-family:'Playfair Display',serif">Aneeba's Collection</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-[#C2185B] font-medium text-sm hover:underline">← Back to Home</a>
        <button id="cartBtn" class="relative p-2 hover:bg-[#FFF0F5] rounded-full transition">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4L5 9z"/>
          </svg>
          <span id="cartCount" class="absolute -top-1 -right-1 bg-[#C2185B] text-white text-xs rounded-full px-1.5">0</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 sm:p-6">
    <div class="mb-6 sm:mb-10">
      <h2 id="catTitle" class="text-2xl sm:text-3xl md:text-4xl font-bold text-gray-800 mb-2"></h2>
      <div class="w-16 h-1 bg-[#C2185B] rounded"></div>
    </div>
    <div id="products" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6"></div>
  </main>

  <div id="cartSidebar" class="hidden fixed top-0 right-0 w-full sm:w-96 h-full bg-white shadow-2xl z-50">
    <div class="flex justify-between items-center p-4 border-b">
      <h3 class="text-xl font-bold text-gray-800">Your Cart</h3>
      <button id="closeCart" class="text-2xl hover:text-[#C2185B]">✕</button>
    </div>
    <div id="cartItems" class="p-4 space-y-3 overflow-y-auto" style="height: calc(100% - 180px);"></div>
    <div class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t">
      <p class="font-bold text-lg mb-3">Total: Rs <span id="cartTotal">0</span></p>
      <button id="orderBtn" class="bg-[#C2185B] text-white w-full py-3 rounded-lg font-semibold hover:bg-[#AD1457] transition">
        Order on WhatsApp
      </button>
    </div>
  </div>
  <div id="cartOverlay" class="hidden fixed inset-0 bg-black/50 z-40"></div>

  <footer class="bg-[#1A1A1A] text-gray-300 text-center py-6 sm:py-8 mt-12">
    <div class="px-4">
      <img src="/logo.png" alt="Logo" class="h-14 mx-auto mb-3 object-contain">
      <h3 class="text-xl sm:text-2xl font-bold text-white mb-2" style="font-family:'Playfair Display',serif">Aneeba's Collection</h3>
      <p class="text-sm">Your one-stop shop for fashion & beauty</p>
      <p class="text-xs mt-3 text-gray-500">© 2025 Aneeba's Collection. All Rights Reserved.</p>
    </div>
  </footer>

  <a href="https://wa.me/923226135815" target="_blank"
     class="fixed bottom-5 right-5 bg-[#25D366] hover:bg-[#1ebe5d] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg z-50 transition transform hover:scale-110">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-8 h-8 fill-white">
      <path d="M16.001 2.667c-7.373 0-13.334 5.961-13.334 13.333 0 2.352.614 4.646 1.781 6.667l-1.875 6.854 7.021-1.84c1.979 1.083 4.213 1.652 6.407 1.652 7.373 0 13.333-5.961 13.333-13.333s-5.96-13.333-13.333-13.333zm0 24c-1.994 0-3.946-.521-5.667-1.507l-.406-.233-4.166 1.093 1.114-4.062-.264-.417c-1.081-1.71-1.652-3.678-1.652-5.707 0-5.894 4.773-10.667 10.667-10.667s10.667 4.773 10.667 10.667-4.773 10.667-10.667 10.667zm5.84-7.973c-.32-.16-1.893-.933-2.187-.96-.293-.053-.507-.08-.72.08s-.827.96-1.013 1.157c-.187.213-.373.24-.693.08-.32-.16-1.347-.493-2.56-1.573-.947-.84-1.587-1.88-1.773-2.2-.187-.32-.02-.493.14-.653.144-.16.32-.373.48-.56.16-.187.213-.32.32-.533.107-.213.053-.4-.027-.56-.08-.16-.72-1.733-.987-2.373-.26-.62-.533-.533-.72-.547l-.613-.013c-.213 0-.56.08-.853.4s-1.12 1.093-1.12 2.667 1.147 3.093 1.307 3.307c.16.213 2.253 3.44 5.467 4.827.763.333 1.36.533 1.827.693.773.24 1.467.213 2.02.133.613-.08 1.893-.773 2.16-1.52.267-.747.267-1.387.187-1.52-.08-.133-.293-.213-.613-.373z"/>
    </svg>
  </a>

<script type="module">
import { initializeApp } from "firebase/app";
import { getFirestore, collection, getDocs, query, where, orderBy } from "firebase/firestore";

const firebaseConfig = {
  apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
  authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
  projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
  storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
  messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
  appId: import.meta.env.VITE_FIREBASE_APP_ID
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const category = new URLSearchParams(window.location.search).get('cat');
document.getElementById('catTitle').textContent = category;

const NOW = Date.now();
const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

function isNew(product) {
  if (!product.createdAt) return false;
  const created = product.createdAt.toMillis ? product.createdAt.toMillis() : product.createdAt * 1000;
  return (NOW - created) < SEVEN_DAYS_MS;
}

let cart = [];

function productCard(p) {
  const newBadge = isNew(p) ? `<span class="absolute top-2 left-2 bg-[#C2185B] text-white text-xs font-bold px-2 py-0.5 rounded-full shadow">NEW</span>` : '';
  const discountedPrice = p.discount ? Math.round(p.price - (p.price * p.discount / 100)) : null;
  const discountBadge = p.discount ? `<span class="absolute top-2 right-2 bg-green-500 text-white text-xs font-bold px-2 py-0.5 rounded-full shadow">${p.discount}% OFF</span>` : '';
  const priceHtml = discountedPrice
    ? `<div class="flex items-center gap-2 flex-wrap">
         <span class="text-[#C2185B] font-bold text-base sm:text-lg">Rs ${discountedPrice}</span>
         <span class="text-gray-400 line-through text-xs">Rs ${p.price}</span>
       </div>`
    : `<p class="text-[#C2185B] font-bold text-base sm:text-lg">Rs ${p.price}</p>`;
  const description = p.description ? `<p class="text-xs text-gray-400 mb-2 line-clamp-2">${p.description}</p>` : '';
  const extraImages = p.images && p.images.length > 1 ? `<div class="absolute bottom-2 right-2 bg-black/60 text-white text-xs px-2 py-1 rounded">+${p.images.length - 1}</div>` : '';

  return `
    <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition overflow-hidden group">
      <div class="overflow-hidden relative">
        <img src="${p.images[0]}" class="w-full h-48 sm:h-56 md:h-64 object-cover group-hover:scale-110 transition duration-300">
        ${newBadge}
        ${discountBadge}
        ${extraImages}
      </div>
      <div class="p-3 sm:p-4">
        <h3 class="font-semibold text-sm sm:text-base mb-1 line-clamp-1 text-gray-800">${p.name}</h3>
        <p class="text-xs text-gray-400 mb-1">${p.category}</p>
        ${description}
        ${priceHtml}
        <button onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&apos;")})'
          class="bg-[#C2185B] text-white w-full py-2 mt-2 rounded-lg hover:bg-[#AD1457] text-sm font-semibold transition">
          Add to Cart
        </button>
      </div>
    </div>`;
}

async function loadCategoryProducts() {
  const q = query(collection(db, "products"), where("category", "==", category), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  const products = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  document.getElementById("products").innerHTML = products.length === 0
    ? `<div class="col-span-2 sm:col-span-4 text-center py-12"><p class="text-gray-400 text-lg">No products in this category yet</p></div>`
    : products.map(p => productCard(p)).join("");
}

window.addToCart = (product) => {
  cart.push(product);
  updateCartUI();
  showToast(product.name + " added to cart!");
};

function updateCartUI() {
  document.getElementById('cartCount').innerText = cart.length;
  if (cart.length === 0) {
    document.getElementById('cartItems').innerHTML = `<p class="text-gray-400 text-center py-10">Your cart is empty</p>`;
    document.getElementById('cartTotal').innerText = 0;
    return;
  }
  document.getElementById('cartItems').innerHTML = cart.map((item, i) => {
    const price = item.discount ? Math.round(item.price - (item.price * item.discount / 100)) : item.price;
    return `
      <div class="flex gap-3 border-b pb-3">
        <img src="${item.images[0]}" class="w-20 h-20 object-cover rounded-lg">
        <div class="flex-1">
          <p class="font-medium text-sm text-gray-800">${item.name}</p>
          <p class="text-xs text-gray-400">${item.category}</p>
          <p class="text-[#C2185B] font-bold">Rs ${price}</p>
          <button onclick="removeFromCart(${i})" class="text-red-400 text-xs mt-1">Remove</button>
        </div>
      </div>`;
  }).join('');
  const total = cart.reduce((sum, item) => {
    const p = item.discount ? Math.round(item.price - (item.price * item.discount / 100)) : item.price;
    return sum + p;
  }, 0);
  document.getElementById('cartTotal').innerText = total;
}

window.removeFromCart = (index) => {
  cart.splice(index, 1);
  updateCartUI();
};

document.getElementById('cartBtn').onclick = () => {
  document.getElementById('cartSidebar').classList.remove('hidden');
  document.getElementById('cartOverlay').classList.remove('hidden');
};
document.getElementById('closeCart').onclick = () => {
  document.getElementById('cartSidebar').classList.add('hidden');
  document.getElementById('cartOverlay').classList.add('hidden');
};
document.getElementById('cartOverlay').onclick = () => {
  document.getElementById('cartSidebar').classList.add('hidden');
  document.getElementById('cartOverlay').classList.add('hidden');
};

document.getElementById('orderBtn').onclick = () => {
  if (cart.length === 0) return alert("Cart is empty!");
  let msg = "🛍️ *New Order - Aneeba's Collection*\n\n";
  cart.forEach((item, i) => {
    const price = item.discount ? Math.round(item.price - (item.price * item.discount / 100)) : item.price;
    msg += `${i + 1}. ${item.name}\n Category: ${item.category}\n Price: Rs ${price}\n\n`;
  });
  const total = cart.reduce((a, b) => {
    const p = b.discount ? Math.round(b.price - (b.price * b.discount / 100)) : b.price;
    return a + p;
  }, 0);
  msg += `*Total: Rs ${total}*\n\nPlease confirm my order.\n\nName: \nAddress: \nPhone: `;
  window.open(`https://wa.me/923226135815?text=${encodeURIComponent(msg)}`);
};

function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-[#C2185B] text-white px-5 py-3 rounded-full shadow-lg z-50 text-sm font-medium';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

loadCategoryProducts();
</script>
</body>
</html>
