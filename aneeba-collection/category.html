<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category – Aneeba's Collection</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *{scroll-behavior:smooth}
    body{font-family:'Poppins',sans-serif;background:#FFF5F8}
    .serif{font-family:'Playfair Display',serif}
    .line-clamp-1{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
    .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .fade-in{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
    .fade-in.visible{opacity:1;transform:none}
    .skeleton{background:linear-gradient(90deg,#f0e0e8 25%,#fce4ec 50%,#f0e0e8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .card-hover{transition:transform .3s ease,box-shadow .3s ease}
    .card-hover:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(194,24,91,.12)}
  </style>
</head>
<body>

  <div class="bg-[#C2185B] text-white text-center py-2 text-xs font-medium tracking-wide px-4">
    🚚 Delivery Available All over Pakistan &nbsp;|&nbsp; ✨ New Arrivals Every Week
  </div>

  <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-pink-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="/logo.png" alt="Logo" class="h-10 sm:h-12 object-contain">
        <span class="text-lg sm:text-xl font-bold text-[#C2185B] serif hidden sm:block">Aneeba's Collection</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="index.html" class="hidden sm:flex items-center gap-1 text-[#C2185B] font-medium text-sm hover:underline">
          ← Home
        </a>
        <button id="cartBtn" class="relative p-2 hover:bg-[#FFF0F5] rounded-full transition">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 7H4L5 9z"/></svg>
          <span id="cartCount" class="absolute -top-0.5 -right-0.5 bg-[#C2185B] text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-semibold">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Category Header -->
  <div class="bg-gradient-to-r from-[#C2185B] to-[#AD1457] text-white">
    <div class="max-w-7xl mx-auto px-6 py-10">
      <p class="text-xs font-semibold tracking-widest uppercase opacity-80 mb-1"><a href="index.html" class="hover:underline">Home</a> › Shop</p>
      <h1 id="catTitle" class="text-2xl sm:text-4xl font-bold serif"></h1>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8 sm:py-12">

    <!-- Sort / Count bar -->
    <div class="flex items-center justify-between mb-6">
      <p id="productCount" class="text-sm text-gray-500"></p>
      <select id="sortSelect" class="text-sm border border-pink-100 rounded-xl px-3 py-2 focus:outline-none focus:border-[#C2185B] bg-white">
        <option value="newest">Newest First</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
    </div>

    <div id="products" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-5"></div>
  </main>

  <!-- Cart Sidebar -->
  <div id="cartSidebar" class="hidden fixed top-0 right-0 w-full sm:w-[380px] h-full bg-white shadow-2xl z-50">
    <div class="flex justify-between items-center p-5 border-b border-pink-50">
      <div>
        <h3 class="text-lg font-bold text-gray-800 serif">Your Cart</h3>
        <p id="cartSubtitle" class="text-xs text-gray-400">0 items</p>
      </div>
      <button id="closeCart" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#FFF0F5] text-gray-500 hover:text-[#C2185B] transition text-lg">✕</button>
    </div>
    <div id="cartItems" class="p-4 space-y-3 overflow-y-auto" style="height:calc(100% - 176px)"></div>
    <div class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t border-pink-50">
      <div class="flex justify-between items-center mb-3">
        <span class="font-semibold text-gray-700">Total</span>
        <span class="text-xl font-bold text-[#C2185B]">Rs <span id="cartTotal">0</span></span>
      </div>
      <button id="orderBtn" class="bg-[#C2185B] text-white w-full py-3 rounded-xl font-semibold hover:bg-[#AD1457] transition flex items-center justify-center gap-2 shadow-md">
        <svg class="w-5 h-5 fill-white" viewBox="0 0 32 32"><path d="M16.001 2.667c-7.373 0-13.334 5.961-13.334 13.333 0 2.352.614 4.646 1.781 6.667l-1.875 6.854 7.021-1.84c1.979 1.083 4.213 1.652 6.407 1.652 7.373 0 13.333-5.961 13.333-13.333s-5.96-13.333-13.333-13.333zm0 24c-1.994 0-3.946-.521-5.667-1.507l-.406-.233-4.166 1.093 1.114-4.062-.264-.417c-1.081-1.71-1.652-3.678-1.652-5.707 0-5.894 4.773-10.667 10.667-10.667s10.667 4.773 10.667 10.667-4.773 10.667-10.667 10.667zm5.84-7.973c-.32-.16-1.893-.933-2.187-.96-.293-.053-.507-.08-.72.08s-.827.96-1.013 1.157c-.187.213-.373.24-.693.08-.32-.16-1.347-.493-2.56-1.573-.947-.84-1.587-1.88-1.773-2.2-.187-.32-.02-.493.14-.653.144-.16.32-.373.48-.56.16-.187.213-.32.32-.533.107-.213.053-.4-.027-.56-.08-.16-.72-1.733-.987-2.373-.26-.62-.533-.533-.72-.547l-.613-.013c-.213 0-.56.08-.853.4s-1.12 1.093-1.12 2.667 1.147 3.093 1.307 3.307c.16.213 2.253 3.44 5.467 4.827.763.333 1.36.533 1.827.693.773.24 1.467.213 2.02.133.613-.08 1.893-.773 2.16-1.52.267-.747.267-1.387.187-1.52-.08-.133-.293-.213-.613-.373z"/></svg>
        Order on WhatsApp
      </button>
    </div>
  </div>
  <div id="cartOverlay" class="hidden fixed inset-0 bg-black/40 z-40"></div>

  <!-- Footer -->
  <footer class="bg-[#1A1A1A] text-gray-400 mt-6">
    <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <img src="/logo.png" class="h-10 object-contain">
        <span class="text-white font-semibold serif">Aneeba's Collection</span>
      </div>
      <p class="text-xs text-gray-600">© 2025 Aneeba's Collection. All Rights Reserved.</p>
      <a href="https://wa.me/923226135815" target="_blank"
        class="flex items-center gap-2 bg-[#25D366] text-white text-sm px-4 py-2 rounded-full hover:bg-[#1ebe5d] transition font-medium">
        Chat on WhatsApp
      </a>
    </div>
  </footer>

  <a href="https://wa.me/923226135815" target="_blank"
     class="fixed bottom-6 right-6 bg-[#25D366] hover:bg-[#1ebe5d] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl z-40 transition transform hover:scale-110">
    <svg class="w-7 h-7 fill-white" viewBox="0 0 32 32"><path d="M16.001 2.667c-7.373 0-13.334 5.961-13.334 13.333 0 2.352.614 4.646 1.781 6.667l-1.875 6.854 7.021-1.84c1.979 1.083 4.213 1.652 6.407 1.652 7.373 0 13.333-5.961 13.333-13.333s-5.96-13.333-13.333-13.333zm0 24c-1.994 0-3.946-.521-5.667-1.507l-.406-.233-4.166 1.093 1.114-4.062-.264-.417c-1.081-1.71-1.652-3.678-1.652-5.707 0-5.894 4.773-10.667 10.667-10.667s10.667 4.773 10.667 10.667-4.773 10.667-10.667 10.667zm5.84-7.973c-.32-.16-1.893-.933-2.187-.96-.293-.053-.507-.08-.72.08s-.827.96-1.013 1.157c-.187.213-.373.24-.693.08-.32-.16-1.347-.493-2.56-1.573-.947-.84-1.587-1.88-1.773-2.2-.187-.32-.02-.493.14-.653.144-.16.32-.373.48-.56.16-.187.213-.32.32-.533.107-.213.053-.4-.027-.56-.08-.16-.72-1.733-.987-2.373-.26-.62-.533-.533-.72-.547l-.613-.013c-.213 0-.56.08-.853.4s-1.12 1.093-1.12 2.667 1.147 3.093 1.307 3.307c.16.213 2.253 3.44 5.467 4.827.763.333 1.36.533 1.827.693.773.24 1.467.213 2.02.133.613-.08 1.893-.773 2.16-1.52.267-.747.267-1.387.187-1.52-.08-.133-.293-.213-.613-.373z"/></svg>
  </a>

<script type="module">
import { initializeApp } from "firebase/app";
import { getFirestore, collection, getDocs, query, where, orderBy } from "firebase/firestore";

const firebaseConfig = {
  apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
  authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
  projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
  storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
  messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
  appId: import.meta.env.VITE_FIREBASE_APP_ID
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const category = new URLSearchParams(window.location.search).get('cat') || '';
document.getElementById('catTitle').textContent = category;
document.title = `${category} – Aneeba's Collection`;

const NOW = Date.now();
const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
let allProducts = [];
let cart = [];

function isNew(p) {
  if (!p.createdAt) return false;
  const t = p.createdAt.toMillis ? p.createdAt.toMillis() : p.createdAt * 1000;
  return NOW - t < SEVEN_DAYS;
}
function discPrice(p) {
  return p.discount ? Math.round(p.price - p.price * p.discount / 100) : null;
}

// Scroll observer
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });

// Skeleton
function showSkeletons() {
  document.getElementById('products').innerHTML = Array(8).fill(`
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm">
      <div class="skeleton h-52"></div>
      <div class="p-4 space-y-2">
        <div class="skeleton h-4 rounded w-3/4"></div>
        <div class="skeleton h-3 rounded w-1/2"></div>
        <div class="skeleton h-8 rounded-lg mt-3"></div>
      </div>
    </div>`).join('');
}

function productCard(p) {
  const dp = discPrice(p);
  return `
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden card-hover fade-in border border-pink-50/60">
      <a href="product.html?id=${p.id}" class="block relative overflow-hidden">
        <img src="${p.images[0]}" loading="lazy" class="w-full h-48 sm:h-56 object-cover hover:scale-105 transition duration-500">
        ${isNew(p) ? `<span class="absolute top-2 left-2 bg-[#C2185B] text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow">NEW</span>` : ''}
        ${p.discount ? `<span class="absolute top-2 right-2 bg-emerald-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow">${p.discount}% OFF</span>` : ''}
        ${p.images.length > 1 ? `<span class="absolute bottom-2 right-2 bg-black/50 text-white text-[10px] px-1.5 py-0.5 rounded-full">+${p.images.length - 1}</span>` : ''}
      </a>
      <div class="p-3 sm:p-4">
        <a href="product.html?id=${p.id}">
          <h3 class="font-semibold text-sm text-gray-800 line-clamp-1 mb-0.5 hover:text-[#C2185B] transition">${p.name}</h3>
        </a>
        ${p.description ? `<p class="text-[11px] text-gray-400 line-clamp-2 mb-2">${p.description}</p>` : ''}
        <div class="flex items-center gap-2 mb-3">
          <span class="text-[#C2185B] font-bold text-base">Rs ${dp ?? p.price}</span>
          ${dp ? `<span class="text-gray-300 line-through text-xs">Rs ${p.price}</span>` : ''}
        </div>
        <div class="flex gap-2">
          <a href="product.html?id=${p.id}"
            class="flex-1 border border-[#C2185B] text-[#C2185B] py-2 rounded-xl hover:bg-[#FFF0F5] text-xs sm:text-sm font-semibold transition text-center">
            View
          </a>
          <button onclick='addToCart(${JSON.stringify(p).replace(/'/g,"&apos;")})'
            class="flex-1 bg-[#C2185B] text-white py-2 rounded-xl hover:bg-[#AD1457] text-xs sm:text-sm font-semibold transition">
            Add to Cart
          </button>
        </div>
      </div>
    </div>`;
}

function renderProducts(products) {
  const el = document.getElementById('products');
  document.getElementById('productCount').textContent = `${products.length} product${products.length !== 1 ? 's' : ''} found`;
  if (!products.length) {
    el.innerHTML = `<div class="col-span-2 sm:col-span-4 text-center py-16">
      <p class="text-4xl mb-3">🛍️</p>
      <p class="text-gray-400 mb-4">No products in this category yet</p>
      <a href="index.html" class="text-[#C2185B] hover:underline text-sm font-medium">← Back to Home</a>
    </div>`;
    return;
  }
  el.innerHTML = products.map(p => productCard(p)).join('');
  el.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

async function loadCategoryProducts() {
  showSkeletons();
  const q = query(collection(db, "products"), where("category", "==", category), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderProducts(allProducts);
}

// Sort
document.getElementById('sortSelect').onchange = (e) => {
  const sorted = [...allProducts];
  if (e.target.value === 'price-asc') sorted.sort((a, b) => (discPrice(a) ?? a.price) - (discPrice(b) ?? b.price));
  if (e.target.value === 'price-desc') sorted.sort((a, b) => (discPrice(b) ?? b.price) - (discPrice(a) ?? a.price));
  renderProducts(sorted);
};

// Cart
window.addToCart = (product) => {
  cart.push(product);
  updateCartUI();
  showToast(`${product.name} added! 🛍️`);
};
window.removeFromCart = (i) => { cart.splice(i, 1); updateCartUI(); };

function updateCartUI() {
  const count = cart.length;
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartSubtitle').textContent = `${count} item${count !== 1 ? 's' : ''}`;

  if (!count) {
    document.getElementById('cartItems').innerHTML =
      `<div class="text-center py-16"><p class="text-4xl mb-3">🛒</p><p class="text-gray-400 text-sm">Your cart is empty</p></div>`;
    document.getElementById('cartTotal').textContent = '0';
    return;
  }

  document.getElementById('cartItems').innerHTML = cart.map((item, i) => {
    const price = discPrice(item) ?? item.price;
    return `
      <div class="flex gap-3 pb-3 border-b border-pink-50">
        <img src="${item.images[0]}" class="w-[72px] h-[72px] object-cover rounded-xl flex-shrink-0">
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-sm text-gray-800 line-clamp-1">${item.name}</p>
          <p class="text-xs text-gray-400 mb-1">${item.category}</p>
          <p class="text-[#C2185B] font-bold text-sm">Rs ${price}</p>
          <button onclick="removeFromCart(${i})" class="text-red-400 text-xs hover:text-red-600 transition mt-0.5">Remove</button>
        </div>
      </div>`;
  }).join('');

  const total = cart.reduce((s, item) => s + (discPrice(item) ?? item.price), 0);
  document.getElementById('cartTotal').textContent = total;
}

document.getElementById('cartBtn').onclick = () => {
  document.getElementById('cartSidebar').classList.remove('hidden');
  document.getElementById('cartOverlay').classList.remove('hidden');
};
const closeCart = () => {
  document.getElementById('cartSidebar').classList.add('hidden');
  document.getElementById('cartOverlay').classList.add('hidden');
};
document.getElementById('closeCart').onclick = closeCart;
document.getElementById('cartOverlay').onclick = closeCart;

document.getElementById('orderBtn').onclick = () => {
  if (!cart.length) return;
  let msg = "🛍️ *New Order – Aneeba's Collection*\n\n";
  cart.forEach((item, i) => {
    const price = discPrice(item) ?? item.price;
    msg += `${i + 1}. *${item.name}*\n   Category: ${item.category}\n   Price: Rs ${price}\n\n`;
  });
  const total = cart.reduce((s, item) => s + (discPrice(item) ?? item.price), 0);
  msg += `*Total: Rs ${total}*\n\nPlease confirm my order.\n\nName: \nAddress: \nPhone: `;
  window.open(`https://wa.me/923226135815?text=${encodeURIComponent(msg)}`);
};

function showToast(message) {
  const t = document.createElement('div');
  t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-full shadow-xl z-50 text-sm font-medium';
  t.textContent = message;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2000);
}

loadCategoryProducts();
</script>
</body>
</html>
