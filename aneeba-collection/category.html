<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Category</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Poppins',sans-serif}</style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-pink-600 font-medium">← Back to Home</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-6">
    <h2 id="catTitle" class="text-3xl font-bold mb-6"></h2>
    <div id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </main>

<script type="module">
import { initializeApp } from "firebase/app";
import { getFirestore, collection, getDocs, query, where, orderBy } from "firebase/firestore";

const firebaseConfig = {
  apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
  authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
  projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
  storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
  messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
  appId: import.meta.env.VITE_FIREBASE_APP_ID
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const category = new URLSearchParams(window.location.search).get('cat');
document.getElementById('catTitle').textContent = category;

async function loadCategoryProducts() {
  const q = query(collection(db, "products"), where("category", "==", category), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  const products = snap.docs.map(doc => doc.data());

  document.getElementById("products").innerHTML = products.length === 0
  ? `<p class="col-span-4 text-center text-gray-500">No products in this category</p>`
    : products.map(p => `
      <div class="bg-white rounded-xl shadow-md hover:shadow-xl transition overflow-hidden">
        <img src="${p.images[0]}" class="w-full h-64 object-cover">
        <div class="p-4">
          <h3 class="font-semibold text-lg">${p.name}</h3>
          <p class="text-pink-600 font-bold text-xl mt-2">Rs ${p.price}</p>
        </div>
      </div>
    `).join("");
}

loadCategoryProducts();
</script>
</body>
</html>
