<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aneeba Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Poppins',sans-serif}</style>
</head>
<body class="bg-gray-100">

  <!-- Login Screen -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center text-pink-600">Aneeba Admin Login</h2>
      <input type="email" id="email" placeholder="Email" class="border w-full p-3 mb-3 rounded focus:outline-none focus:border-pink-600">
      <input type="password" id="password" placeholder="Password" class="border w-full p-3 mb-4 rounded focus:outline-none focus:border-pink-600">
      <button id="loginBtn" class="bg-pink-600 text-white w-full py-3 rounded hover:bg-pink-700 font-semibold">Login</button>
      <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden">Wrong email or password!</p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="hidden p-4 md:p-6">
    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow">
      
      <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h2 class="text-2xl font-bold">Admin Dashboard</h2>
        <button id="logoutBtn" class="text-red-600 hover:underline font-medium">Logout</button>
      </div>

      <!-- Add Product -->
      <div class="border-b pb-6 mb-6">
        <h3 class="text-xl font-bold mb-4">Add Product</h3>
        <form id="productForm">
          <input name="name" placeholder="Product Name" class="border w-full p-2 mb-2 rounded" required>
          <input name="price" type="number" placeholder="Price" class="border w-full p-2 mb-2 rounded" required>

          <select name="category" class="border w-full p-2 mb-2 rounded" required>
            <option value="">Select Category</option>
            <optgroup label="Dresses">
              <option value="Ready To Wear">Ready To Wear</option>
              <option value="Unstitched">Unstitched</option>
              <option value="Formal">Formal</option>
              <option value="Western Wear">Western Wear</option>
              <option value="Fancy">Fancy</option>
            </optgroup>
            <optgroup label="Accessories">
              <option value="HandBags">HandBags</option>
              <option value="Jwellery">Jwellery</option>
              <option value="Fragrance">Fragrance</option>
            </optgroup>
            <optgroup label="Cosmetics">
              <option value="Skin Care">Skin Care</option>
              <option value="Hair Care">Hair Care</option>
              <option value="Body Care">Body Care</option>
              <option value="Makeup">Makeup</option>
            </optgroup>
          </select>

          <div class="mb-3">
            <label class="block text-sm font-medium mb-1">Product Images</label>
            <input type="file" id="productImages" name="images" multiple accept="image/*" class="border w-full p-2 rounded" required>
            <div id="imagePreview" class="grid grid-cols-4 gap-2 mt-2"></div>
          </div>

          <button class="bg-green-600 text-white px-4 py-2 rounded w-full hover:bg-green-700 font-semibold">Add Product</button>
        </form>
      </div>

      <!-- Banner Management -->
      <div class="border-b pb-6 mb-6">
        <h3 class="text-xl font-bold mb-4">Manage Hero Banners</h3>
        <div class="bg-gray-50 p-4 rounded-lg mb-4">
          <input type="file" id="bannerInput" accept="image/*" multiple class="mb-3 w-full">
          <button id="uploadBannerBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 font-semibold">
            Upload Banners
          </button>
        </div>
        <div id="bannerList" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
      </div>

      <!-- Products List -->
      <div>
        <h3 class="text-xl font-bold mb-3">All Products</h3>
        <div id="productList" class="space-y-3"></div>
      </div>
    </div>
  </div>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, getDoc, setDoc, serverTimestamp } from "firebase/firestore";
import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

const firebaseConfig = {
  apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
  authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
  projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
  storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
  messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
  appId: import.meta.env.VITE_FIREBASE_APP_ID
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// Auth Logic
document.getElementById('loginBtn').onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, 
      document.getElementById('email').value, 
      document.getElementById('password').value
    );
  } catch {
    document.getElementById('errorMsg').classList.remove('hidden');
  }
}

document.getElementById('logoutBtn').onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadProducts();
    loadBanners();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
  }
});

// Image Preview
const imageInput = document.querySelector('input[name="images"]');
const imagePreview = document.getElementById('imagePreview');
if(imageInput){
  imageInput.onchange = () => {
    imagePreview.innerHTML = '';
    Array.from(imageInput.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.innerHTML += `<img src="${e.target.result}" class="w-full h-20 object-cover rounded border">`;
      };
      reader.readAsDataURL(file);
    });
  };
}

// Load Products
async function loadProducts() {
  const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
  const querySnapshot = await getDocs(q);
  const products = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

  document.getElementById('productList').innerHTML = products.length === 0 
    ? `<p class="text-gray-500">No products yet</p>`
    : products.map(p => `
      <div class="border p-3 rounded flex justify-between items-center">
        <div class="flex gap-3">
          ${p.images && p.images[0] ? `<img src="${p.images[0]}" class="w-16 h-16 object-cover rounded">` : ''}
          <div>
            <p class="font-semibold">${p.name}</p>
            <p class="text-sm text-gray-600">Rs. ${p.price} - ${p.category}</p>
          </div>
        </div>
        <button onclick="deleteProduct('${p.id}')" class="text-red-600 text-sm hover:underline">Delete</button>
      </div>
    `).join('');
}

// Add Product
document.getElementById("productForm").onsubmit = async (e) => {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector('button');
  btn.disabled = true;
  btn.textContent = "Uploading...";

  try {
    const imageUrls = [];
    for (let file of form.images.files) {
      const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(storageRef, file);
      imageUrls.push(await getDownloadURL(snapshot.ref));
    }

    await addDoc(collection(db, "products"), {
      name: form.name.value,
      price: form.price.value,
      category: form.category.value,
      images: imageUrls,
      createdAt: serverTimestamp()
    });

    form.reset();
    imagePreview.innerHTML = '';
    loadProducts();
    alert("Product Added!");
  } catch (error) {
    alert("Error: " + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Add Product";
  }
};

window.deleteProduct = async (id) => {
  if(confirm("Delete this product?")){
    await deleteDoc(doc(db, "products", id));
    loadProducts();
  }
};

// Banner Management
const bannerInput = document.getElementById('bannerInput');
const uploadBannerBtn = document.getElementById('uploadBannerBtn');
const bannerList = document.getElementById('bannerList');

async function loadBanners() {
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const banners = docSnap.exists() ? docSnap.data().list || [] : [];

  bannerList.innerHTML = banners.length === 0
   ? `<p class="text-gray-500 col-span-3">No banners uploaded yet</p>`
    : banners.map((banner, index) => `
      <div class="relative group">
        <img src="${banner.url}" class="w-full h-32 object-cover rounded-lg">
        <button onclick="deleteBanner('${banner.id}')"
          class="absolute top-2 right-2 bg-red-600 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition">
          Delete
        </button>
      </div>
    `).join("");
}

uploadBannerBtn.onclick = async () => {
  const files = bannerInput.files;
  if (!files.length) return alert("Select images first!");

  uploadBannerBtn.disabled = true;
  uploadBannerBtn.textContent = "Uploading...";

  try {
    const docSnap = await getDoc(doc(db, "settings", "banners"));
    const existing = docSnap.exists() ? docSnap.data().list || [] : [];

    const newBanners = await Promise.all(Array.from(files).map(async (file) => {
      const storageRef = ref(storage, `banners/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(storageRef, file);
      return { id: Date.now() + Math.random(), url: await getDownloadURL(snapshot.ref) };
    }));

    await setDoc(doc(db, "settings", "banners"), { list: [...existing, ...newBanners] });
    bannerInput.value = '';
    loadBanners();
    alert(`${newBanners.length} banner(s) uploaded!`);
  } catch (error) {
    alert("Error: " + error.message);
  } finally {
    uploadBannerBtn.disabled = false;
    uploadBannerBtn.textContent = "Upload Banners";
  }
};

window.deleteBanner = async (id) => {
  if (!confirm("Delete this banner?")) return;
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const updated = (docSnap.data().list || []).filter(b => b.id != id);
  await setDoc(doc(db, "settings", "banners"), { list: updated });
  loadBanners();
};
</script>
</body>
</html>
