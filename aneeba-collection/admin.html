<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aneeba Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Poppins',sans-serif}</style>
</head>
<body class="bg-[#FFF5F8]">

  <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
      <div class="text-center mb-6">
        <img src="/logo.png" alt="Logo" class="h-20 mx-auto mb-3 object-contain">
        <h2 class="text-2xl font-bold text-[#C2185B]">Admin Login</h2>
      </div>
      <input type="email" id="email" placeholder="Email" class="border w-full p-3 mb-3 rounded-lg focus:outline-none focus:border-[#C2185B]">
      <input type="password" id="password" placeholder="Password" class="border w-full p-3 mb-4 rounded-lg focus:outline-none focus:border-[#C2185B]">
      <button id="loginBtn" class="bg-[#C2185B] text-white w-full py-3 rounded-lg hover:bg-[#AD1457] font-semibold transition">Login</button>
      <p id="errorMsg" class="text-red-500 text-sm mt-3 hidden text-center">Wrong email or password!</p>
    </div>
  </div>

  <div id="adminPanel" class="hidden p-4 md:p-6">
    <div class="max-w-5xl mx-auto">

      <div class="bg-white p-5 rounded-2xl shadow mb-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <img src="/logo.png" class="h-12 object-contain">
          <h2 class="text-xl font-bold text-[#C2185B]">Admin Dashboard</h2>
        </div>
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-[#C2185B] hover:underline font-medium text-sm flex items-center gap-1">
            🌐 View Website
          </a>
          <button id="logoutBtn" class="text-red-500 hover:underline font-medium text-sm">Logout</button>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow mb-6">
        <h3 class="text-lg font-bold mb-4 text-[#C2185B]">Add New Product</h3>
        <form id="productForm" class="space-y-3">
          <input name="name" placeholder="Product Name" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]" required>

          <div class="grid grid-cols-2 gap-3">
            <input name="price" type="number" placeholder="Price (Rs)" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]" required>
            <input name="discount" type="number" min="0" max="100" placeholder="Discount % (optional)" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]">
          </div>

          <textarea name="description" placeholder="Product Description (optional)" rows="3" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B] resize-none"></textarea>

          <select name="category" class="border w-full p-3 rounded-lg focus:outline-none focus:border-[#C2185B]" required>
            <option value="">Select Category</option>
            <optgroup label="Dresses">
              <option value="Ready To Wear">Ready To Wear</option>
              <option value="Unstitched">Unstitched</option>
              <option value="Formal">Formal</option>
              <option value="Western Wear">Western Wear</option>
              <option value="Fancy">Fancy</option>
            </optgroup>
            <optgroup label="Accessories">
              <option value="HandBags">HandBags</option>
              <option value="Jwellery">Jwellery</option>
              <option value="Fragrance">Fragrance</option>
            </optgroup>
            <optgroup label="Cosmetics">
              <option value="Skin Care">Skin Care</option>
              <option value="Hair Care">Hair Care</option>
              <option value="Body Care">Body Care</option>
              <option value="Makeup">Makeup</option>
            </optgroup>
          </select>

          <div>
            <label class="block text-sm font-medium mb-1 text-gray-600">Product Images</label>
            <input type="file" id="productImages" name="images" multiple accept="image/*" class="border w-full p-2 rounded-lg" required>
            <div id="imagePreview" class="grid grid-cols-4 gap-2 mt-2"></div>
          </div>

          <button class="bg-[#C2185B] text-white px-6 py-3 rounded-lg w-full hover:bg-[#AD1457] font-semibold transition">Add Product</button>
        </form>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow mb-6">
        <h3 class="text-lg font-bold mb-4 text-[#C2185B]">Manage Hero Banners</h3>
        <div class="bg-[#FFF5F8] p-4 rounded-xl mb-4 space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Select Banner Image(s)</label>
            <input type="file" id="bannerInput" accept="image/*" multiple class="w-full border p-2 rounded-lg bg-white">
          </div>
          <div id="bannerTextFields" class="space-y-3"></div>
          <button id="uploadBannerBtn" class="bg-[#C2185B] text-white px-4 py-2 rounded-lg hover:bg-[#AD1457] font-semibold transition w-full">
            Upload Banners
          </button>
        </div>
        <div id="bannerList" class="space-y-3"></div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow mb-6">
        <h3 class="text-lg font-bold mb-4 text-[#C2185B]">All Products</h3>
        <div id="productList" class="space-y-3"></div>
      </div>

      <!-- Orders Section -->
      <div class="bg-white p-6 rounded-2xl shadow">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold text-[#C2185B]">📦 Orders</h3>
          <span id="newOrderBadge" class="hidden bg-red-500 text-white text-xs px-2.5 py-1 rounded-full font-bold animate-pulse"></span>
        </div>
        <div id="orderList" class="space-y-4"></div>
      </div>

    </div>
  </div>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, orderBy, query, getDoc, setDoc, serverTimestamp } from "firebase/firestore";
import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

const firebaseConfig = {
  apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
  authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
  projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
  storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
  messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
  appId: import.meta.env.VITE_FIREBASE_APP_ID
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

document.getElementById('loginBtn').onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth,
      document.getElementById('email').value,
      document.getElementById('password').value
    );
  } catch {
    document.getElementById('errorMsg').classList.remove('hidden');
  }
};

document.getElementById('logoutBtn').onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadProducts();
    loadBanners();
    loadOrders();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
  }
});

const imageInput = document.querySelector('input[name="images"]');
const imagePreview = document.getElementById('imagePreview');
if (imageInput) {
  imageInput.onchange = () => {
    imagePreview.innerHTML = '';
    Array.from(imageInput.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.innerHTML += `<img src="${e.target.result}" class="w-full h-20 object-cover rounded border">`;
      };
      reader.readAsDataURL(file);
    });
  };
}

async function loadProducts() {
  const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
  const querySnapshot = await getDocs(q);
  const products = querySnapshot.docs.map(d => ({ id: d.id, ...d.data() }));

  document.getElementById('productList').innerHTML = products.length === 0
    ? `<p class="text-gray-500">No products yet</p>`
    : products.map(p => {
        const discountedPrice = p.discount ? Math.round(p.price - (p.price * p.discount / 100)) : null;
        return `
          <div class="border rounded-xl p-3 flex justify-between items-center gap-3">
            <div class="flex gap-3 items-center">
              ${p.images && p.images[0] ? `<img src="${p.images[0]}" class="w-16 h-16 object-cover rounded-lg flex-shrink-0">` : ''}
              <div>
                <p class="font-semibold">${p.name}</p>
                <p class="text-xs text-gray-500">${p.category}</p>
                ${p.description ? `<p class="text-xs text-gray-400 mt-0.5 line-clamp-1">${p.description}</p>` : ''}
                <div class="flex gap-2 items-center mt-1">
                  ${discountedPrice
                    ? `<span class="text-[#C2185B] font-bold text-sm">Rs ${discountedPrice}</span>
                       <span class="text-gray-400 line-through text-xs">Rs ${p.price}</span>
                       <span class="bg-green-100 text-green-700 text-xs px-1.5 py-0.5 rounded">${p.discount}% OFF</span>`
                    : `<span class="text-[#C2185B] font-bold text-sm">Rs ${p.price}</span>`
                  }
                </div>
              </div>
            </div>
            <button onclick="deleteProduct('${p.id}')" class="text-red-500 text-sm hover:underline flex-shrink-0">Delete</button>
          </div>`;
      }).join('');
}

document.getElementById("productForm").onsubmit = async (e) => {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector('button');
  btn.disabled = true;
  btn.textContent = "Uploading...";

  try {
    const imageUrls = [];
    for (let file of form.images.files) {
      const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(storageRef, file);
      imageUrls.push(await getDownloadURL(snapshot.ref));
    }

    await addDoc(collection(db, "products"), {
      name: form.name.value,
      price: Number(form.price.value),
      discount: form.discount.value ? Number(form.discount.value) : 0,
      description: form.description.value.trim(),
      category: form.category.value,
      images: imageUrls,
      createdAt: serverTimestamp()
    });

    form.reset();
    imagePreview.innerHTML = '';
    loadProducts();
    alert("Product Added!");
  } catch (error) {
    alert("Error: " + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Add Product";
  }
};

window.deleteProduct = async (id) => {
  if (confirm("Delete this product?")) {
    await deleteDoc(doc(db, "products", id));
    loadProducts();
  }
};

const bannerInput = document.getElementById('bannerInput');
const uploadBannerBtn = document.getElementById('uploadBannerBtn');
const bannerList = document.getElementById('bannerList');
const bannerTextFields = document.getElementById('bannerTextFields');

bannerInput.onchange = () => {
  const files = Array.from(bannerInput.files);
  if (!files.length) { bannerTextFields.innerHTML = ''; return; }

  bannerTextFields.innerHTML = files.map((file, i) => `
    <div class="border rounded-xl p-3 bg-white space-y-2">
      <p class="text-xs font-semibold text-gray-500">Banner ${i + 1}: ${file.name}</p>
      <input type="text" id="banner-title-${i}" placeholder="Title (e.g. BIG SALE UPTO 50%)"
        class="border w-full p-2 rounded-lg text-sm focus:outline-none focus:border-[#C2185B]">
      <input type="text" id="banner-subtitle-${i}" placeholder="Subtitle (e.g. Discover the latest fashion & beauty trends)"
        class="border w-full p-2 rounded-lg text-sm focus:outline-none focus:border-[#C2185B]">
      <input type="text" id="banner-btntext-${i}" placeholder='Button text (e.g. Shop Now →)'
        class="border w-full p-2 rounded-lg text-sm focus:outline-none focus:border-[#C2185B]">
    </div>`).join('');
};

async function loadBanners() {
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const banners = docSnap.exists() ? docSnap.data().list || [] : [];

  bannerList.innerHTML = banners.length === 0
    ? `<p class="text-gray-400 text-sm">No banners uploaded yet</p>`
    : banners.map(banner => `
        <div class="border rounded-xl overflow-hidden">
          <div class="relative group">
            <img src="${banner.url}" class="w-full h-36 object-cover">
            <button onclick="deleteBanner('${banner.id}')"
              class="absolute top-2 right-2 bg-red-600 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition">
              Delete
            </button>
          </div>
          <div class="p-3 bg-[#FFF5F8] space-y-1">
            <p class="font-semibold text-sm text-gray-800">${banner.title || '(No title set)'}</p>
            <p class="text-xs text-gray-500">${banner.subtitle || '(No subtitle set)'}</p>
            ${banner.btnText ? `<p class="text-xs text-[#C2185B]">Button: ${banner.btnText}</p>` : ''}
            <button onclick="editBannerText('${banner.id}')" class="text-xs text-[#C2185B] hover:underline mt-1">Edit Text</button>
          </div>
        </div>`).join("");
}

uploadBannerBtn.onclick = async () => {
  const files = bannerInput.files;
  if (!files.length) return alert("Select images first!");

  uploadBannerBtn.disabled = true;
  uploadBannerBtn.textContent = "Uploading...";

  try {
    const docSnap = await getDoc(doc(db, "settings", "banners"));
    const existing = docSnap.exists() ? docSnap.data().list || [] : [];

    const newBanners = await Promise.all(Array.from(files).map(async (file, i) => {
      const storageRef = ref(storage, `banners/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(storageRef, file);
      return {
        id: Date.now() + Math.random(),
        url: await getDownloadURL(snapshot.ref),
        title: document.getElementById(`banner-title-${i}`)?.value.trim() || '',
        subtitle: document.getElementById(`banner-subtitle-${i}`)?.value.trim() || '',
        btnText: document.getElementById(`banner-btntext-${i}`)?.value.trim() || 'Shop Now →'
      };
    }));

    await setDoc(doc(db, "settings", "banners"), { list: [...existing, ...newBanners] });
    bannerInput.value = '';
    bannerTextFields.innerHTML = '';
    loadBanners();
    alert(`${newBanners.length} banner(s) uploaded!`);
  } catch (error) {
    alert("Error: " + error.message);
  } finally {
    uploadBannerBtn.disabled = false;
    uploadBannerBtn.textContent = "Upload Banners";
  }
};

window.editBannerText = async (id) => {
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const banners = docSnap.data().list || [];
  const banner = banners.find(b => b.id == id);
  if (!banner) return;

  const title = prompt("Banner Title:", banner.title || '');
  if (title === null) return;
  const subtitle = prompt("Banner Subtitle:", banner.subtitle || '');
  if (subtitle === null) return;
  const btnText = prompt("Button Text:", banner.btnText || 'Shop Now →');
  if (btnText === null) return;

  const updated = banners.map(b => b.id == id ? { ...b, title: title.trim(), subtitle: subtitle.trim(), btnText: btnText.trim() } : b);
  await setDoc(doc(db, "settings", "banners"), { list: updated });
  loadBanners();
};

window.deleteBanner = async (id) => {
  if (!confirm("Delete this banner?")) return;
  const docSnap = await getDoc(doc(db, "settings", "banners"));
  const updated = (docSnap.data().list || []).filter(b => b.id != id);
  await setDoc(doc(db, "settings", "banners"), { list: updated });
  loadBanners();
};

async function loadOrders() {
  const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  const newCount = orders.filter(o => o.status === 'new').length;
  const badge = document.getElementById('newOrderBadge');
  if (newCount > 0) {
    badge.textContent = `${newCount} New`;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  const statusColors = {
    new:        'bg-blue-100 text-blue-700',
    processing: 'bg-amber-100 text-amber-700',
    delivered:  'bg-green-100 text-green-700',
    cancelled:  'bg-red-100 text-red-700'
  };

  document.getElementById('orderList').innerHTML = orders.length === 0
    ? `<div class="text-center py-10"><p class="text-3xl mb-2">📭</p><p class="text-gray-400 text-sm">No orders yet</p></div>`
    : orders.map(o => {
        const date = o.createdAt?.toDate
          ? o.createdAt.toDate().toLocaleString('en-PK', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
          : '';
        const sc = statusColors[o.status] || 'bg-gray-100 text-gray-700';
        const statusLabel = o.status.charAt(0).toUpperCase() + o.status.slice(1);
        return `
          <div class="border border-pink-100 rounded-2xl p-4 space-y-3 ${o.status === 'new' ? 'border-l-4 border-l-blue-400' : ''}">
            <div class="flex items-start justify-between gap-3">
              <div class="space-y-0.5">
                <p class="font-bold text-gray-800">${o.customerName}</p>
                <p class="text-xs text-gray-500">📱 ${o.phone}</p>
                <p class="text-xs text-gray-500">🏠 ${o.address}, ${o.city}${o.zipCode ? ' – ' + o.zipCode : ''}</p>
                <p class="text-xs text-gray-500">💳 ${o.paymentMethod}</p>
                ${date ? `<p class="text-xs text-gray-400">🕐 ${date}</p>` : ''}
              </div>
              <div class="text-right flex-shrink-0">
                <p class="text-lg font-bold text-[#C2185B]">Rs ${Number(o.total)}</p>
                <span class="text-xs ${sc} px-2.5 py-1 rounded-full font-semibold">${statusLabel}</span>
              </div>
            </div>

            <div class="flex flex-wrap gap-2">
              ${(o.items || []).map(item => `
                <div class="flex items-center gap-1.5 bg-[#FFF5F8] rounded-lg px-2 py-1.5 border border-pink-100">
                  <img src="${item.image}" class="w-7 h-7 object-cover rounded">
                  <div>
                    <p class="text-xs font-medium text-gray-700 leading-none">${item.name}</p>
                    <p class="text-xs text-[#C2185B] font-bold">Rs ${item.price}</p>
                  </div>
                </div>`).join('')}
            </div>

            <div class="flex flex-wrap gap-2 pt-1 border-t border-pink-50">
              <select onchange="updateOrderStatus('${o.id}', this.value)"
                class="text-xs border border-pink-100 rounded-lg px-2.5 py-1.5 focus:outline-none focus:border-[#C2185B] bg-white">
                <option value="new"        ${o.status === 'new'        ? 'selected' : ''}>🔵 New</option>
                <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>🟡 Processing</option>
                <option value="delivered"  ${o.status === 'delivered'  ? 'selected' : ''}>🟢 Delivered</option>
                <option value="cancelled"  ${o.status === 'cancelled'  ? 'selected' : ''}>🔴 Cancelled</option>
              </select>
              <a href="https://wa.me/${o.phone.replace(/[^0-9]/g,'')}" target="_blank"
                class="text-xs bg-[#25D366] text-white px-3 py-1.5 rounded-lg hover:bg-[#1ebe5d] transition font-semibold flex items-center gap-1">
                💬 WhatsApp
              </a>
              <button onclick="deleteOrder('${o.id}')"
                class="text-xs text-red-400 hover:text-red-600 px-2 py-1.5 transition">
                Delete
              </button>
            </div>
          </div>`;
      }).join('');
}

window.updateOrderStatus = async (id, status) => {
  await updateDoc(doc(db, "orders", id), { status });
  loadOrders();
};

window.deleteOrder = async (id) => {
  if (!confirm('Delete this order permanently?')) return;
  await deleteDoc(doc(db, "orders", id));
  loadOrders();
};
</script>
</body>
</html>
